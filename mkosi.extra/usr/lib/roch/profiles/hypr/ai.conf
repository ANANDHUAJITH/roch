# AI Profile Overrides
# GPU-optimized, multiple terminals

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# AI keybinds
bind = SUPER, J, exec, foot -e jupyter lab
bind = SUPER, O, exec, ollama serve
bind = SUPER SHIFT, O, exec, foot -e ollama run llama3
bind = SUPER, N, exec, foot -e nvtop
bind = SUPER, S, exec, foot -e python -m http.server 8080
