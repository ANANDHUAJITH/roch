# Developer Profile Overrides
# Optimized for coding and terminal work

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
}

decoration {
    rounding = 4
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# Developer keybinds
bind = SUPER, C, exec, code
bind = SUPER, T, exec, foot -e tmux
bind = SUPER SHIFT, G, exec, lazygit
bind = SUPER, D, exec, docker ps
bind = SUPER SHIFT, D, exec, foot -e lazydocker
