# Gaming Profile Overrides
# Maximum performance, minimal overhead

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 0
    allow_tearing = true
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# Disable animations for gaming
animations {
    enabled = no
}

# Game mode keybinds
bind = SUPER, G, exec, gamemoderun steam
bind = SUPER, L, exec, lutris
bind = SUPER, O, exec, obs-studio

# Window rules for games
windowrulev2 = fullscreen,class:^(steam_app_*)$
windowrulev2 = immediate,class:^(steam_app_*)$
windowrulev2 = immediate,class:^(.*\.exe)$
