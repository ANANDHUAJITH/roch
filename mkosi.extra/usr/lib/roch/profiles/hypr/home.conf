# Home Profile Overrides
# Relaxed settings for daily use

general {
    gaps_in = 8
    gaps_out = 14
    border_size = 2
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 8
    }
}

# Home-specific keybinds
bind = SUPER, W, exec, firefox
bind = SUPER, F, exec, thunar
