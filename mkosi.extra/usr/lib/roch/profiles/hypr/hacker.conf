# Hacker Profile Overrides
# Minimal, dark, secure

general {
    gaps_in = 1
    gaps_out = 2
    border_size = 1
    col.active_border = rgba(00ff00ee)
    col.inactive_border = rgba(003300aa)
}

decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# Hacker keybinds
bind = SUPER, N, exec, foot -e nmap -sn 192.168.1.0/24
bind = SUPER, W, exec, wireshark
bind = SUPER, B, exec, burpsuite
bind = SUPER, M, exec, metasploit
bind = SUPER, T, exec, foot -e proxychains-ng firefox
bind = SUPER, V, exec, foot -e nmap
bind = SUPER, R, exec, foot -e radare2

# Security window rules
windowrulev2 = float,class:^(wireshark)$
windowrulev2 = size 1200 800,class:^(wireshark)$
windowrulev2 = float,class:^(burpsuite)$
windowrulev2 = size 1400 900,class:^(burpsuite)$
