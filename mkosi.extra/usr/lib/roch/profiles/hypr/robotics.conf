# Robotics Profile Overrides
# CAD and simulation focused

general {
    gaps_in = 2
    gaps_out = 4
    border_size = 1
}

decoration {
    rounding = 6
    blur {
        enabled = false
    }
}

# Robotics keybinds
bind = SUPER, R, exec, rviz2
bind = SUPER, G, exec, gazebo
bind = SUPER, B, exec, blender
bind = SUPER, F, exec, freecad
bind = SUPER, K, exec, kicad
