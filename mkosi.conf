[Distribution]
Distribution=arch

[Output]
Format=disk
Output=roch-os
SplitArtifacts=yes
CompressOutput=no

[Content]
Bootable=yes

# Base system
Packages=
    base
    base-devel
    linux-zen
    linux-zen-headers
    linux-firmware
    systemd
    systemd-ukify
    btrfs-progs
    dosfstools
    mtools
    sbctl
    tpm2-tools
    bubblewrap
    sudo
    polkit
    bash
    git
    wget
    curl
    networkmanager

# Security
Packages=
    apparmor
    audit
    nftables
    firejail

# Boot / Display
Packages=
    greetd
    greetd-tuigreet
    reflector
    snapper

# Desktop — Hyprland stack
Packages=
    hyprland
    xdg-desktop-portal-hyprland
    xdg-desktop-portal
    waybar
    foot
    fuzzel
    mako

# Kernel command line — roch.profile value is replaced by CI for profile builds
KernelCommandLine=rw quiet apparmor=1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf roch.profile=home

[Host]
QemuSmp=4
QemuMem=4G
